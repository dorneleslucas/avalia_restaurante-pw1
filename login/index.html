<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Avalia Restaurante</title>
     <script src="login.js" defer></script>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header class="cabecalho">
        <div class="container barra">
            <a class="logo" href="../home/index.html">Avalia Restaurante</a>
            <nav class="menu" aria-label="Menu principal">
                <a href="../home/index.html">Home</a>
                <a href="../destaques/index.html">Destaques</a>
                <a href="../feedback/index.html">Avaliar</a>
                <a class="ativo" href="../login/index.html">Login</a>
                <a href="../cadastro/index.html">Cadastro</a>
            </nav>
        </div>
    </header>

    <main class="conteudo">
        <div class="container">
            <h1>Login</h1>
            <p>Entre para acessar suas avaliações salvas futuramente.</p>

            <form class="formulario">
                <label>
                    E-mail
                    <input type="email" name="email" placeholder="seuemail@exemplo.com">
                </label>

                <label>
                    Senha
                    <input type="password" name="senha" placeholder="Digite sua senha">
                </label>

                <button type="button">Entrar</button>
            </form>
        </div>
    </main>

    <footer class="rodape">
        <div class="container">Página de login visual, ainda sem JavaScript.</div>
    </footer>
</body>
</html>
